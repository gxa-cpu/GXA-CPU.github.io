<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>领取资料</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#FFF8E7;color:#333;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:20px;padding:30px 24px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
h2{font-size:22px;color:#333;margin-bottom:8px}
.subtitle{font-size:14px;color:#999;margin-bottom:24px}
.input-wrap{display:flex;gap:8px;margin-bottom:16px}
.input-wrap input{flex:1;border:2px solid #e5e7eb;border-radius:12px;padding:14px 16px;font-size:18px;outline:none;text-align:center;letter-spacing:2px}
.input-wrap input:focus{border-color:#f97316}
.input-wrap button{background:#f97316;color:#fff;border:none;padding:14px 20px;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;white-space:nowrap}
.error{color:#ef4444;font-size:14px;display:none;margin-bottom:12px}
.success{display:none;margin-top:20px;padding:20px;background:#f0fdf4;border-radius:16px;border:2px solid #22c55e}
.success h3{color:#16a34a;font-size:18px;margin-bottom:12px}
.link-box{background:#fff;border:2px solid #22c55e;border-radius:12px;padding:14px;margin:12px 0;word-break:break-all;font-size:14px;color:#333;text-align:left;position:relative}
.link-box .url{color:#0284c7;text-decoration:underline;user-select:all;-webkit-user-select:all}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-copy{flex:1;background:#22c55e;color:#fff;border:none;padding:12px;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-open{flex:1;background:#0284c7;color:#fff;border:none;padding:12px;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}
.tip{font-size:12px;color:#999;margin-top:12px}
.back{display:inline-block;margin-top:16px;color:#f97316;font-size:14px;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div id="codeSection">
    <h2>🔑 输入取件码</h2>
    <p class="subtitle">付款后从对话框获取取件码，输入后领取资料</p>
    <div class="input-wrap">
      <input type="text" id="codeInput" placeholder="请输入取件码" maxlength="20">
      <button onclick="verifyCode()">领取</button>
    </div>
    <p class="error" id="errorMsg">❌ 取件码错误，请重新输入</p>
    <p style="font-size:13px;color:#999;margin-top:8px">没拿到取件码？在下方对话框输入"付完了"获取</p>
    <a href="index.html" class="back">← 返回首页</a>
  </div>
  
  <div class="success" id="successSection">
    <h3>✅ 领取成功！</h3>
    <p style="font-size:14px;color:#666;margin-bottom:8px">你的资料链接：</p>
    <div class="link-box">
      <span class="url" id="fullUrl">https://fuye-shop.surge.sh/manual.html</span>
    </div>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyLink()">📋 复制链接</button>
      <a class="btn-open" href="https://fuye-shop.surge.sh/manual.html" target="_blank">📖 打开查看</a>
    </div>
    <p class="tip">💡 收藏链接，永久有效，随时查看</p>
    <p class="tip" style="margin-top:4px">长按链接也可以复制</p>
  </div>
</div>

<script>
// 当前取件码（每周更新）
const CURRENT_CODE = 'fuye0706';

function verifyCode(){
  const input = document.getElementById('codeInput').value.trim().toLowerCase();
  const error = document.getElementById('errorMsg');
  
  if(input === CURRENT_CODE){
    document.getElementById('codeSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
    error.style.display = 'none';
  } else {
    error.style.display = 'block';
    document.getElementById('codeInput').style.borderColor = '#ef4444';
  }
}

function copyLink(){
  const url = 'https://fuye-shop.surge.sh/manual.html';
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{
      alert('✅ 链接已复制！');
    });
  } else {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ 链接已复制！');
  }
}

// 回车提交
document.getElementById('codeInput').addEventListener('keypress', function(e){
  if(e.key === 'Enter') verifyCode();
});
</script>
</body>
</html>
