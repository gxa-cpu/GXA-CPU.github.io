  /* ========== 基础重置与全局 ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #f97316;
    --primary-dark: #ea580c;
    --primary-light: #fff7ed;
    --primary-bg: #fed7aa;
    --text: #1c1917;
    --text-secondary: #57534e;
    --white: #ffffff;
    --bg: #fafaf9;
    --border: #e7e5e4;
    --success: #16a34a;
    --shadow: 0 4px 24px rgba(249,115,22,0.15);
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ========== 头部 ========== */
  .header {
    width: 100%;
    max-width: 600px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    padding: 28px 24px 24px;
    text-align: center;
    border-radius: 0 0 24px 24px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: "💰";
    position: absolute;
    top: -10px;
    right: -10px;
    font-size: 64px;
    opacity: 0.15;
    transform: rotate(-15deg);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 17px;
    opacity: 0.92;
  }

  /* ========== 聊天容器 ========== */
  .chat-container {
    width: 100%;
    max-width: 600px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 24px;
    gap: 16px;
    overflow-y: auto;
  }

  /* ========== 消息气泡 ========== */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { justify-content: flex-start; }
  .message.user { justify-content: flex-end; }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    background: var(--primary-bg);
    border: 2px solid var(--primary);
  }
  .message.user .avatar { display: none; }

  .bubble {
    max-width: 82%;
    padding: 16px 20px;
    border-radius: var(--radius);
    font-size: 18px;
    line-height: 1.7;
    word-break: break-word;
  }
  .message.bot .bubble {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-top-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .message.user .bubble {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    border-top-right-radius: 4px;
    box-shadow: 0 2px 12px rgba(249,115,22,0.25);
  }

  /* ========== 选项按钮组 ========== */
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
    animation: fadeIn 0.5s ease;
  }

  .option-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 22px;
    font-size: 17px;
    font-weight: 600;
    color: var(--primary-dark);
    background: var(--primary-light);
    border: 2px solid var(--primary-bg);
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:hover {
    background: var(--primary);
    color: var(--white);
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(249,115,22,0.3);
  }
  .option-btn:active {
    transform: scale(0.96);
  }
  .option-btn .icon { font-size: 20px; }

  /* ========== 推荐卡片 ========== */
  .rec-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 10px;
    animation: fadeIn 0.6s ease;
  }

  .rec-card {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.25s;
  }
  .rec-card:hover {
    border-color: var(--primary);
    box-shadow: 0 6px 20px rgba(249,115,22,0.15);
    transform: translateY(-2px);
  }

  .rec-card-header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rec-card-header .rec-emoji { font-size: 28px; }
  .rec-card-header .rec-title { font-size: 20px; font-weight: 700; }
  .rec-card-header .rec-tag {
    margin-left: auto;
    background: rgba(255,255,255,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  .rec-card-body {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .rec-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .rec-meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 16px;
    font-weight: 600;
  }
  .rec-meta-item .meta-icon { font-size: 18px; }
  .rec-meta-item.cost { color: #dc2626; }
  .rec-meta-item.income { color: var(--success); }
  .rec-meta-item.time { color: var(--text-secondary); }

  .rec-steps-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 2px;
  }
  .rec-steps {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rec-steps li {
    counter-increment: step;
    font-size: 16px;
    color: var(--text-secondary);
    padding-left: 32px;
    position: relative;
    line-height: 1.5;
  }
  .rec-steps li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 2px;
    width: 24px;
    height: 24px;
    background: var(--primary-bg);
    color: var(--primary-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }

  /* ========== 重新开始按钮 ========== */
  .restart-area {
    text-align: center;
    padding: 8px 0 20px;
  }
  .restart-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 36px;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(249,115,22,0.3);
    transition: all 0.2s;
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(249,115,22,0.4);

  /* ========== 打字动画 ========== */
  .typing-dots {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
  }

  /* ========== 响应式 ========== */
  @media (max-width: 420px) {
    .header h1 { font-size: 24px; }
    .bubble { font-size: 17px; }
    .option-btn { font-size: 16px; padding: 10px 18px; }
    .rec-card-header .rec-title { font-size: 18px; }
  }

      { value: "1000",    label: "1000元左右",       icon: "💵" },
      { value: "5000",    label: "5000元左右",       icon: "💰" },
      { value: "10000+",  label: "1万以上",          icon: "💎" }
    ]
  },
  {
    key: "time",
    text: "明白了！那你每天能花多少时间做副业？",
    options: [
      { value: "1h",   label: "1小时左右", icon: "⏰" },
      { value: "3h",   label: "3小时左右", icon: "🕐" },
      { value: "full", label: "全天都行",  icon: "🔋" }
    ]
  },
  {
    key: "skill",
    text: "最后一个问题！你会下面哪些技能？",
    options: [
      { value: "打字", label: "会打字/用手机", icon: "⌨️" },
      { value: "拍照", label: "会拍照/拍视频", icon: "📷" },
      { value: "无",   label: "啥都不会也没关系", icon: "😊" }
    ]
  }
];

// ========== 年龄映射 ==========
function getAgeRange(ageKey) {
  const map = {
    young:  { min: 18, max: 30 },
    mid:    { min: 30, max: 50 },
    older:  { min: 50, max: 65 },
    senior: { min: 65, max: 99 }
  };
  return map[ageKey] || { min: 18, max: 99 };
}

// ========== 匹配逻辑 ==========
function matchHustles(answers) {
  const ageRange = getAgeRange(answers.age);
  const money = answers.money;
  const time = answers.time;
  const skill = answers.skill;

  const scored = SIDE_HUSTLES.map(h => {
    const m = h.match;
    let score = 0;

    // 年龄匹配
    const ageOk = ageRange.min >= (m.ageMin || 0) && ageRange.max <= m.ageMax;
    const ageOverlap = ageOk || (ageRange.min < m.ageMax && ageRange.max > (m.ageMin || 0));
    if (ageOk) score += 3;
    else if (ageOverlap) score += 1;

    // 资金匹配
    if (m.money.includes(money)) score += 3;

    // 时间匹配
    if (m.time.includes(time)) score += 2;

    // 技能匹配
    if (m.skill.includes(skill)) score += 2;

    return { hustle: h, score };
  });

  // 按分数排序，取前5个得分>0的
  const matched = scored
    .filter(s => s.score >= 3)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5)
    .map(s => s.hustle);

  // 保底：如果太少，补入一些零门槛的
  if (matched.length < 3) {
    const fallback = SIDE_HUSTLES.filter(h =>
      h.match.money.includes("0") && !matched.find(m => m.id === h.id)
    );
    for (const fb of fallback) {
      if (matched.length >= 3) break;
      matched.push(fb);
    }
  }

  return matched;
}

// ========== UI 控制 ==========
const container = document.getElementById('chatContainer');
const restartArea = document.getElementById('restartArea');
let answers = {};
let currentStep = 0;

function addMessage(type, content) {
  const div = document.createElement('div');
  div.className = `message ${type}`;

  if (type === 'bot') {
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🧧';
    div.appendChild(avatar);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = content.replace(/\n/g, '<br>');
  div.appendChild(bubble);

  container.appendChild(div);
  scrollToBottom();
  return bubble;
}

function addOptions(options, onSelect) {
  const wrapper = document.createElement('div');
  wrapper.className = 'message bot';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🧧';
  wrapper.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.background = 'transparent';
  bubble.style.border = 'none';
  bubble.style.boxShadow = 'none';
  bubble.style.padding = '0';

  const optDiv = document.createElement('div');
  optDiv.className = 'options';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="icon">${opt.icon}</span> ${opt.label}`;
    btn.addEventListener('click', () => {
      // 禁用所有按钮
      optDiv.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        b.style.opacity = '0.5';
        b.style.cursor = 'default';
      });
      btn.style.opacity = '1';
      btn.style.background = 'var(--primary)';
      btn.style.color = 'var(--white)';
      btn.style.borderColor = 'var(--primary)';
      onSelect(opt.value, opt.label);
    });
    optDiv.appendChild(btn);
  });

  bubble.appendChild(optDiv);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🧧';
  div.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(bubble);

  container.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function scrollToBottom() {
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

// ========== 主流程 ==========
function askQuestion(step) {
  if (step >= QUESTIONS.length) {
    showResults();
    return;
  }

  const q = QUESTIONS[step];

  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage('bot', q.text);
    addOptions(q.options, (value, label) => {
      answers[q.key] = value;
      addMessage('user', label);
      setTimeout(() => askQuestion(step + 1), 400);
    });
  }, 600);
}

function showResults() {
  const matched = matchHustles(answers);

  showTyping();
  setTimeout(() => {
    hideTyping();

    const ageLabel = { young: "30岁以下", mid: "30-50岁", older: "50-65岁", senior: "65岁以上" }[answers.age] || "";
    const moneyLabel = { "0": "0元", "1000": "1000元", "5000": "5000元", "10000+": "1万以上" }[answers.money] || "";
    const timeLabel = { "1h": "1小时", "3h": "3小时", "full": "全天" }[answers.time] || "";
    const skillLabel = { "打字": "会打字", "拍照": "会拍照", "无": "零基础" }[answers.skill] || "";

    addMessage('bot',
      `✨ 分析完毕！根据你的情况：<br>` +
      `<strong>${ageLabel} · ${moneyLabel} · 每天${timeLabel} · ${skillLabel}</strong><br><br>` +
      `为你推荐以下 <strong>${matched.length}</strong> 个副业方案👇`
    );

    setTimeout(() => {
      const cardsWrapper = document.createElement('div');
      cardsWrapper.className = 'message bot';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🧧';
      cardsWrapper.appendChild(avatar);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.maxWidth = '95%';
      bubble.style.background = 'transparent';
      bubble.style.border = 'none';
      bubble.style.boxShadow = 'none';
      bubble.style.padding = '0';

      const cardsDiv = document.createElement('div');
      cardsDiv.className = 'rec-cards';

      matched.forEach((h, i) => {
        setTimeout(() => {
          const card = createCard(h, i + 1);
          cardsDiv.appendChild(card);
          scrollToBottom();
        }, i * 200);
      });

      bubble.appendChild(cardsDiv);
      cardsWrapper.appendChild(bubble);
      container.appendChild(cardsWrapper);

      setTimeout(() => {
        addMessage('bot', '💡 记住：任何副业都需要坚持至少1个月才能看到效果！选一个最心动的，今天就行动起来吧！');
        restartArea.style.display = 'block';
        scrollToBottom();
      }, matched.length * 200 + 500);

    }, 400);
  }, 800);
}

function createCard(h, rank) {
  const card = document.createElement('div');
  card.className = 'rec-card';

  card.innerHTML = `
    <div class="rec-card-header">
      <span class="rec-emoji">${h.emoji}</span>
      <span class="rec-title">No.${rank} ${h.name}</span>
      <span class="rec-tag">${h.tag}</span>
    </div>
    <div class="rec-card-body">
      <div class="rec-meta">
        <span class="rec-meta-item cost"><span class="meta-icon">💸</span> 投入：${h.cost}</span>
        <span class="rec-meta-item income"><span class="meta-icon">💵</span> 收入：${h.income}</span>
        <span class="rec-meta-item time"><span class="meta-icon">⏱️</span> ${h.timeNeed}</span>
      </div>
      <div>
        <div class="rec-steps-title">📝 操作步骤：</div>
        <ol class="rec-steps">
          ${h.steps.map(s => `<li>${s}</li>`).join('')}
        </ol>
      </div>
    </div>
  `;

  return card;
}

// ========== 重新开始 ==========
function restart() {
  container.innerHTML = '';
  restartArea.style.display = 'none';
  answers = {};
  currentStep = 0;
  askQuestion(0);
}

// ========== 启动 ==========
askQuestion(0);
</script>
